name: verify

# The PR/commit gate (design §10): Layer 0 plus the Layer 1 replay slice, all
# keyless and deterministic, targeting under three minutes. This is replay, not
# discovery: it checks PayFlow against the already accepted agent authored spec,
# it never re-runs the property generation agent (that is the nightly lane, which
# needs an API budget). No secrets are referenced here by design.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies (keyless)
        run: uv sync

      - name: Layer 0 - import contracts
        run: uv run lint-imports

      - name: Drift gates - diagrams and contracts cannot lie
        run: uv run pytest tests/drift -q

      - name: Layer 1 - property sanity machine + concurrency A
        run: >-
          uv run pytest tests/property
          "tests/concurrency/test_idempotent_replay.py::test_replay_correct_build_single_effect"
          -q

      - name: Layer 1 - agent discovered specs replay (in process, offline)
        run: uv run pytest mutation/replay/test_agent_replay.py -q

      # Soft assertion report: runs every check regardless of earlier failures (CI
      # is bash -e, so the steps above stop at the first red). This renders the full
      # pass/fail matrix into the run's job summary and uploads it as an artifact, so
      # a red run still shows exactly which check localized the fault.
      - name: Pipeline report (soft, runs even if a gate failed)
        if: always()
        run: |
          uv run showcase --report showcase-report || true
          cat showcase-report/showcase-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload pipeline report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-report
          path: showcase-report/
          if-no-files-found: warn
