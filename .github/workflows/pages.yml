# Static GitHub Pages deploy: serves the single-page walkthrough (site/index.html,
# with the trust report folded in) at the site root. site/ is self contained (no
# build, no external assets), so this just stages and publishes it.
#
# The only push-triggered workflow here; ci.yml and nightly.yml stay dispatch/PR
# scoped. One-time owner action before the first run:
# Settings -> Pages -> Build and deployment -> Source = "GitHub Actions".
name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Stage the site
        run: |
          mkdir -p _site
          cp -R site/. _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
